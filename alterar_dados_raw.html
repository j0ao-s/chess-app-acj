<body class="bg-surface-container-lowest text-on-background min-h-screen flex flex-col items-center antialiased">
<!-- TopAppBar JSON Execution -->
<header class="fixed top-0 w-full z-40 bg-white dark:bg-black font-['Inter'] font-semibold tracking-tight border-b border-zinc-900 dark:border-zinc-100 flex items-center justify-between px-6 h-16 max-w-screen-md mx-auto">
<button aria-label="Voltar" class="text-zinc-900 dark:text-zinc-50 hover:bg-zinc-100 dark:hover:bg-zinc-900 transition-colors active:opacity-70 flex items-center justify-center p-2 -ml-2 rounded-full">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="text-zinc-900 dark:text-zinc-50 font-bold text-lg tracking-tighter uppercase">Alterar Dados</h1>
<div class="w-10"></div> <!-- Balancing empty space for true center alignment -->
</header>
<!-- Main Canvas -->
<main class="w-full max-w-screen-md px-margin-mobile pt-24 pb-32 flex-grow flex flex-col">
<!-- Form Fields -->
<div class="flex flex-col gap-lg flex-grow mt-lg">
<div class="flex flex-col group relative">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase mb-xs transition-colors group-focus-within:text-primary-container" for="nome">Nome</label>
<input class="w-full bg-transparent border-0 border-b border-inverse-surface px-0 py-sm font-body-lg text-body-lg text-on-background focus:ring-0 focus:border-b-primary-container transition-colors" id="nome" type="text" value="Garry Kasparov"/>
</div>
<div class="flex flex-col group relative">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase mb-xs transition-colors group-focus-within:text-primary-container" for="username">Username</label>
<input class="w-full bg-transparent border-0 border-b border-inverse-surface px-0 py-sm font-body-lg text-body-lg text-on-background focus:ring-0 focus:border-b-primary-container transition-colors" id="username" type="text" value="g_kasparov"/>
</div>
<div class="flex flex-col group relative">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase mb-xs transition-colors group-focus-within:text-primary-container" for="email">E-mail</label>
<input class="w-full bg-transparent border-0 border-b border-inverse-surface px-0 py-sm font-body-lg text-body-lg text-on-background focus:ring-0 focus:border-b-primary-container transition-colors" id="email" type="email" value="garry@chessclub.com"/>
</div>
</div>
<!-- Action Buttons -->
<div class="flex flex-col gap-md mt-xl pt-xl border-t border-surface-variant">
<button class="w-full bg-on-background text-surface-container-lowest font-label-sm text-label-sm uppercase tracking-widest py-md rounded active:scale-95 transition-transform flex items-center justify-center h-12">
                Salvar Alterações
            </button>
<button class="w-full bg-transparent text-on-background border border-on-background font-label-sm text-label-sm uppercase tracking-widest py-md rounded active:bg-surface-variant transition-colors flex items-center justify-center h-12">
                Cancelar
            </button>
</div>
</main>
<!-- Snackbar/Toast Overlay -->
<div class="fixed bottom-lg left-margin-mobile right-margin-mobile max-w-sm mx-auto z-50 bg-inverse-surface text-inverse-on-surface px-md py-md rounded shadow-[0px_10px_20px_-5px_rgba(0,0,0,0.1)] flex items-center gap-md border border-inverse-surface">
<span class="material-symbols-outlined text-surface-container-lowest" data-icon="check_circle">check_circle</span>
<span class="font-body-md text-body-md text-surface-container-lowest flex-grow">Dados atualizados com sucesso</span>
</div>
<!-- Navigation Suppressed: Task-Focused Screen (Linear Edit Mode) -->
</body></html>
