<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Alterar Senha - Chess Club Minimalist UI</title>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Config -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-error": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "secondary-fixed": "#e4e2e1",
                        "surface-bright": "#f9f9f9",
                        "error": "#ba1a1a",
                        "on-primary-fixed": "#00174b",
                        "on-tertiary-fixed-variant": "#7d2d00",
                        "on-background": "#1b1b1b",
                        "surface-container-lowest": "#ffffff",
                        "surface-tint": "#0053db",
                        "error-container": "#ffdad6",
                        "background": "#f9f9f9",
                        "on-error-container": "#93000a",
                        "inverse-surface": "#303030",
                        "surface-container-high": "#e8e8e8",
                        "inverse-on-surface": "#f1f1f1",
                        "surface-container": "#eeeeee",
                        "outline": "#737686",
                        "tertiary": "#943700",
                        "on-tertiary-fixed": "#360f00",
                        "surface-container-low": "#f3f3f3",
                        "on-secondary-fixed-variant": "#474747",
                        "surface": "#ffffff",
                        "secondary-fixed-dim": "#c8c6c6",
                        "secondary-container": "#e4e2e1",
                        "surface-variant": "#e2e2e2",
                        "on-primary": "#ffffff",
                        "inverse-primary": "#b4c5ff",
                        "on-tertiary-container": "#ffede6",
                        "on-primary-fixed-variant": "#003ea8",
                        "primary": "#004ac6",
                        "tertiary-container": "#bc4800",
                        "on-surface-variant": "#434655",
                        "on-secondary-container": "#656464",
                        "surface-dim": "#dadada",
                        "on-secondary-fixed": "#1b1c1c",
                        "tertiary-fixed": "#ffdbcd",
                        "tertiary-fixed-dim": "#ffb596",
                        "primary-fixed-dim": "#b4c5ff",
                        "secondary": "#5f5e5e",
                        "on-secondary": "#ffffff",
                        "primary-container": "#2563eb",
                        "outline-variant": "#c3c6d7",
                        "on-primary-container": "#eeefff",
                        "surface-container-highest": "#e2e2e2",
                        "primary-fixed": "#dbe1ff",
                        "on-surface": "#1b1b1b"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "unit": "4px",
                        "md": "16px",
                        "margin-mobile": "20px",
                        "gutter": "16px",
                        "lg": "24px",
                        "sm": "8px",
                        "xs": "4px",
                        "xl": "48px"
                    },
                    "fontFamily": {
                        "label-sm": ["Inter", "sans-serif"],
                        "headline-lg": ["Inter", "sans-serif"],
                        "display-xl": ["Inter", "sans-serif"],
                        "headline-md": ["Inter", "sans-serif"],
                        "body-md": ["Inter", "sans-serif"],
                        "body-lg": ["Inter", "sans-serif"]
                    },
                    "fontSize": {
                        "label-sm": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "500" }],
                        "headline-lg": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "display-xl": ["40px", { "lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "headline-md": ["20px", { "lineHeight": "28px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "body-md": ["14px", { "lineHeight": "20px", "letterSpacing": "0em", "fontWeight": "400" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "letterSpacing": "0em", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col antialiased selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar -->
<header class="flex items-center justify-between px-lg h-[64px] w-full docked full-width top-0 border-b border-outline bg-surface z-10 sticky top-0">
<button aria-label="Go back" class="flex items-center justify-center p-sm -ml-sm rounded-full hover:bg-surface-variant transition-colors active:opacity-70 text-on-surface group">
<span class="material-symbols-outlined group-hover:-translate-x-1 transition-transform" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md text-on-surface flex-1 text-center pr-[40px]">Alterar Senha</h1>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 w-full max-w-md mx-auto p-lg flex flex-col gap-xl mt-md">
<!-- Form Section -->
<form class="flex flex-col gap-xl w-full">
<div class="flex flex-col gap-sm relative group">
<label class="font-label-sm text-label-sm text-on-surface-variant" for="current-password">Senha Atual</label>
<input class="w-full bg-transparent border-0 border-b border-outline p-0 pb-xs font-body-lg text-body-lg text-on-surface focus:ring-0 focus:border-primary-container transition-colors placeholder:text-surface-dim" id="current-password" placeholder=" " type="password" value="••••••••"/>
</div>
<div class="flex flex-col gap-sm relative group">
<label class="font-label-sm text-label-sm text-on-surface-variant" for="new-password">Nova Senha</label>
<input class="w-full bg-transparent border-0 border-b border-outline p-0 pb-xs font-body-lg text-body-lg text-on-surface focus:ring-0 focus:border-primary-container transition-colors placeholder:text-surface-dim" id="new-password" placeholder=" " type="password" value="••••••••••••"/>
</div>
<div class="flex flex-col gap-sm relative group">
<label class="font-label-sm text-label-sm text-on-surface-variant" for="confirm-password">Confirmar Nova Senha</label>
<input class="w-full bg-transparent border-0 border-b border-outline p-0 pb-xs font-body-lg text-body-lg text-on-surface focus:ring-0 focus:border-primary-container transition-colors placeholder:text-surface-dim" id="confirm-password" placeholder=" " type="password" value="••••••••••••"/>
</div>
</form>
<!-- Actions Section -->
<div class="flex flex-col gap-md mt-md">
<button class="w-full bg-on-surface text-surface py-md px-lg rounded-DEFAULT font-label-sm text-label-sm uppercase tracking-widest hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center" type="button">
                ALTERAR SENHA
            </button>
<button class="w-full bg-transparent border border-on-surface text-on-surface py-md px-lg rounded-DEFAULT font-label-sm text-label-sm uppercase tracking-widest hover:bg-surface-variant active:scale-[0.98] transition-all flex items-center justify-center" type="button">
                CANCELAR
            </button>
</div>
</main>
<!-- Snackbar / Toast Notification -->
<div class="fixed bottom-lg left-1/2 transform -translate-x-1/2 bg-surface border border-outline px-lg py-sm flex items-center gap-md rounded-DEFAULT shadow-[0_0_10px_rgba(0,0,0,0.05)] z-50 pointer-events-none animate-[slideUp_0.3s_ease-out]">
<span class="material-symbols-outlined text-primary-container" data-icon="check_circle" data-weight="fill" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<span class="font-body-md text-body-md text-on-surface">Senha alterada com sucesso</span>
</div>
<style>
        @keyframes slideUp {
            from { opacity: 0; transform: translate(-50%, 20px); }
            to { opacity: 1; transform: translate(-50%, 0); }
        }
    </style>
</body></html>
