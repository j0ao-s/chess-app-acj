<style>
        body {
            background-color: #f9f9f9;
            color: #1b1b1b;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #ffffff; 
        }
        ::-webkit-scrollbar-thumb {
            background: #e2e2e2;

        }

        }

<body class="bg-surface font-body-md antialiased min-h-screen flex flex-col selection:bg-on-surface selection:text-surface-container-lowest">
<!-- TopAppBar -->
<header class="bg-white border-b-[1px] border-zinc-900 flex justify-between items-center w-full px-6 h-16 fixed top-0 z-50">
<div class="flex items-center gap-sm">
<div class="w-8 h-8 rounded-full border border-zinc-900 overflow-hidden bg-surface-container-high flex-shrink-0">
<img alt="User profile photo" class="w-full h-full object-cover grayscale" data-alt="A stark, minimalist black and white portrait photograph of a focused chess player. The lighting is high-key, creating sharp contrast against a pure white background. The subject conveys intense intellectual concentration, fitting the professional and rigorous mood of a grandmaster." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDcyuNx4Op8mIygkWZR1hoPdNm5rI1H1ijBAAZFUZysBMt1_N-Q2GwfbGTq2FwW22O-F2WIVG7kmeRrupZqaloSwf1mT8Sz5Ded6m_9VtI8t1d0rBIuGUGJHXwnpF-nq0SLLSAlyA7NFKqU2Zf0QB-yyDsfO_-B5tZDwA-0zyImVWnEQPgkHv2AqQDtOcepSIqEE2ayg76bSUVTtDl9sQt4WCLnLCPM86cqZn1hbukU-MA5qcUf9wcNLDws0IIvpHA-oQzIv6IPz28"/>
</div>
<span class="text-sm font-black uppercase tracking-widest text-zinc-900">G. Kasparov</span>
</div>
<button class="text-zinc-900 hover:bg-zinc-50 transition-colors active:opacity-70 p-2 rounded-full flex items-center justify-center focus:outline-none focus:ring-2 focus:ring-on-surface">
<span class="material-symbols-outlined">notifications</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow pt-24 pb-32 px-margin-mobile md:px-lg w-full max-w-4xl mx-auto flex flex-col gap-xl">
<!-- Contextual Header -->
<section class="flex flex-col gap-xs pt-lg">
<h1 class="font-display-xl text-display-xl text-on-surface">Olá, G. Kasparov</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-lg">O tabuleiro está montado. Qual será o seu próximo movimento no clube hoje?</p>
</section>
<!-- Minimalist Bento Grid -->
<section class="grid grid-cols-2 gap-xs md:gap-gutter">
<!-- Card 1: Alterar Dados -->
<a class="bg-surface-container-lowest border border-on-surface p-lg aspect-square flex flex-col justify-between items-start transition-colors hover:bg-surface-container group outline-none focus:ring-2 focus:ring-primary-container ring-offset-2 ring-offset-surface" href="#">
<div class="p-xs md:p-sm border border-on-surface rounded-DEFAULT bg-surface-container-lowest group-hover:bg-on-surface group-hover:text-surface-container-lowest transition-colors flex items-center justify-center">
<span class="material-symbols-outlined text-[24px] md:text-[32px] font-light">person</span>
</div>
<div class="flex flex-col w-full">
<span class="font-headline-md text-headline-md text-on-surface leading-tight">Alterar<br/>Dados</span>
<div class="h-[1px] w-full bg-on-surface mt-sm opacity-0 group-hover:opacity-100 transition-opacity"></div>
</div>
</a>
<!-- Card 2: Alterar Senha -->
<a class="bg-surface-container-lowest border border-on-surface p-lg aspect-square flex flex-col justify-between items-start transition-colors hover:bg-surface-container group outline-none focus:ring-2 focus:ring-primary-container ring-offset-2 ring-offset-surface" href="#">
<div class="p-xs md:p-sm border border-on-surface rounded-DEFAULT bg-surface-container-lowest group-hover:bg-on-surface group-hover:text-surface-container-lowest transition-colors flex items-center justify-center">
<span class="material-symbols-outlined text-[24px] md:text-[32px] font-light">key</span>
</div>
<div class="flex flex-col w-full">
<span class="font-headline-md text-headline-md text-on-surface leading-tight">Alterar<br/>Senha</span>
<div class="h-[1px] w-full bg-on-surface mt-sm opacity-0 group-hover:opacity-100 transition-opacity"></div>
</div>
</a>
<!-- Card 3: Classificação -->
<a class="bg-surface-container-lowest border border-on-surface p-lg aspect-square flex flex-col justify-between items-start transition-colors hover:bg-surface-container group outline-none focus:ring-2 focus:ring-primary-container ring-offset-2 ring-offset-surface" href="#">
<div class="p-xs md:p-sm border border-on-surface rounded-DEFAULT bg-surface-container-lowest group-hover:bg-on-surface group-hover:text-surface-container-lowest transition-colors flex items-center justify-center">
<span class="material-symbols-outlined text-[24px] md:text-[32px] font-light">emoji_events</span>
</div>
<div class="flex flex-col w-full">
<span class="font-headline-md text-headline-md text-on-surface leading-tight">Classificação<br/> </span>
<div class="h-[1px] w-full bg-on-surface mt-sm opacity-0 group-hover:opacity-100 transition-opacity"></div>
</div>
</a>
<!-- Card 4: Decorative Architectural Element -->
<div class="bg-on-surface border border-on-surface p-lg aspect-square flex flex-col justify-center items-center relative overflow-hidden">
<!-- Abstract Grid Pattern indicating structure/board -->
<div class="absolute inset-0 grid grid-cols-8 grid-rows-8 opacity-10">
<!-- Repeated blocks to form a subtle, high-end texture rather than a literal board -->
<div class="bg-surface-container-lowest col-start-1 col-end-3 row-start-1 row-end-3"></div>
<div class="bg-surface-container-lowest col-start-5 col-end-7 row-start-3 row-end-5"></div>
<div class="bg-surface-container-lowest col-start-2 col-end-4 row-start-7 row-end-9"></div>
<div class="bg-surface-container-lowest col-start-7 col-end-9 row-start-6 row-end-8"></div>
</div>
<div class="z-10 w-16 h-16 md:w-24 md:h-24 border border-surface-container-lowest/30 flex items-center justify-center">
<span class="material-symbols-outlined text-surface-container-lowest text-[40px] md:text-[56px] font-thin" style="font-variation-settings: 'FILL' 1;">
                        chess
                    </span>
</div>
</div>
</section>
</main>

<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center bg-white px-4 h-20 border-t-[1px] border-zinc-900 md:hidden">

<span class="font-inter text-[10px] uppercase tracking-tighter mt-1">Dashboard</span>

<span class="material-symbols-outlined">lock</span>
<span class="font-inter text-[10px] uppercase tracking-tighter mt-1">Segurança</span>
</a>
<!-- Ranking (Inactive) -->
<a class="flex flex-col items-center justify-center text-zinc-400 pt-2 pb-1 hover:text-zinc-600 active:scale-95 transition-transform duration-150 w-full h-full border-t-2 border-transparent" href="#">
<span class="material-symbols-outlined">leaderboard</span>
<span class="font-inter text-[10px] uppercase tracking-tighter mt-1">Ranking</span>
</a>
