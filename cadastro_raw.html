<body class="bg-background text-on-background min-h-screen flex flex-col antialiased">
<!-- Transactional Screen: Navigation Suppressed -->
<main class="flex-grow flex flex-col items-center justify-center p-gutter md:p-xl w-full max-w-[480px] mx-auto">
<!-- Header Section -->
<div class="flex flex-col items-center mb-xl w-full">
<div class="mb-sm flex items-center justify-center w-16 h-16 rounded-full bg-on-background text-surface-container-lowest">
<span class="material-symbols-outlined text-[32px]">
                    token
                </span>
</div>
<h1 class="font-display-xl text-display-xl text-center tracking-tighter uppercase text-on-background">
                CHESS CLUB
            </h1>
</div>
<!-- Form Section -->
<form class="w-full flex flex-col gap-lg" novalidate="">
<!-- Nome Field -->
<div class="flex flex-col gap-xs relative">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest" for="nome">
                    Nome
                </label>
<input class="border-0 border-b border-outline bg-transparent px-0 py-sm font-body-lg text-body-lg text-on-background placeholder:text-outline-variant focus:ring-0 focus:border-on-background transition-colors w-full rounded-none" id="nome" name="nome" placeholder="Seu nome completo" type="text"/>
</div>
<!-- Username Field (Validation Error State) -->
<div class="flex flex-col gap-xs relative">
<label class="font-label-sm text-label-sm text-error uppercase tracking-widest" for="username">
                    Username
                </label>
<input class="border-0 border-b border-error bg-transparent px-0 py-sm font-body-lg text-body-lg text-on-background focus:ring-0 focus:border-error transition-colors w-full rounded-none" id="username" name="username" type="text" value="grandmaster_j"/>
<p class="font-label-sm text-label-sm text-error mt-xs flex items-center gap-xs">
<span class="material-symbols-outlined text-[14px]">error</span>
                    Este usuário ou e-mail já está em uso.
                </p>
</div>
<!-- E-mail Field -->
<div class="flex flex-col gap-xs relative">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest" for="email">
                    E-mail
                </label>
<input class="border-0 border-b border-outline bg-transparent px-0 py-sm font-body-lg text-body-lg text-on-background placeholder:text-outline-variant focus:ring-0 focus:border-on-background transition-colors w-full rounded-none" id="email" name="email" type="email" value="jm@example.com"/>
</div>
<!-- Senha Field -->
<div class="flex flex-col gap-xs relative">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest" for="senha">
                    Senha
                </label>
<input class="border-0 border-b border-outline bg-transparent px-0 py-sm font-body-lg text-body-lg text-on-background placeholder:text-outline-variant focus:ring-0 focus:border-on-background transition-colors w-full rounded-none" id="senha" name="senha" placeholder="••••••••" type="password"/>
</div>
<!-- Actions -->
<div class="mt-md flex flex-col gap-md">
<button class="w-full bg-on-background text-surface-container-lowest py-md rounded font-label-sm text-label-sm uppercase tracking-widest hover:bg-inverse-surface transition-colors focus:outline-none focus:ring-2 focus:ring-on-background focus:ring-offset-2 focus:ring-offset-background" type="button">
                    Criar Conta
                </button>
</div>

<a class="font-body-md text-body-md text-on-surface-variant hover:text-on-background underline decoration-1 underline-offset-4 transition-colors" href="#">
