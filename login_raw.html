<!DOCTYPE html>

<html class="light" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - CHESS CLUB</title>

                    "on-secondary": "#ffffff",
                    "error-container": "#ffdad6",
                    "surface": "#f9f9f9",
                    "error": "#ba1a1a",

                    "on-tertiary-container": "#ffede6",
                    "secondary-container": "#e4e2e1",
                    "surface-container-low": "#f3f3f3",
                    "on-primary-container": "#eeefff",
                    "outline-variant": "#c3c6d7",
                    "surface-variant": "#e2e2e2",
                    "surface-container": "#eeeeee",
                    "on-error-container": "#93000a",
                    "primary": "#004ac6",

                    "tertiary-fixed": "#ffdbcd",
                    "surface-container-lowest": "#ffffff",
                    "primary-container": "#2563eb",
                    "surface-tint": "#0053db",
                    "on-primary-fixed": "#00174b",
                    "secondary": "#5f5e5e",
                    "primary-fixed": "#dbe1ff",
                    "on-error": "#ffffff",
                    "surface-container-high": "#e8e8e8",

            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",

            "spacing": {
                    "md": "16px",
                    "gutter": "16px",
                    "unit": "4px",

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface-container-lowest text-on-surface antialiased min-h-screen flex flex-col items-center justify-center p-6">
<!-- Main Login Container -->
<main class="w-full max-w-[400px] flex flex-col gap-xl">
<!-- Header / Logo -->
<header class="flex flex-col items-center justify-center gap-sm">
<span class="material-symbols-outlined text-[48px] text-on-surface" data-icon="chess" data-weight="fill" style="font-variation-settings: 'FILL' 1;">
                chess
            </span>
<h1 class="font-display-xl text-display-xl text-on-surface tracking-tighter uppercase font-bold text-center">
                CHESS CLUB
            </h1>
</header>
<!-- Login Form -->
<form class="flex flex-col gap-lg w-full">
<!-- Username Input -->
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-on-surface" for="username">Usuário</label>
<input class="w-full bg-transparent border-0 border-b border-on-surface px-0 py-sm focus:ring-0 focus:border-primary transition-colors font-body-lg text-body-lg text-on-surface placeholder-secondary-fixed-dim" id="username" placeholder="Seu nome de usuário" type="text"/>
</div>
<!-- Password Input with Error -->
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-on-surface" for="password">Senha</label>
<input class="w-full bg-transparent border-0 border-b border-error px-0 py-sm focus:ring-0 focus:border-error transition-colors font-body-lg text-body-lg text-on-surface placeholder-secondary-fixed-dim" id="password" placeholder="Sua senha" type="password" value="wrongpassword"/>
<span class="font-body-md text-body-md text-error mt-xs">
                    Dados incorretos. Tente novamente.
                </span>
</div>
<!-- Primary Action -->
<button class="mt-md w-full bg-on-surface text-on-primary font-body-lg text-body-lg font-medium py-md px-lg rounded flex items-center justify-center hover:opacity-90 transition-opacity border border-on-surface" type="button">
                Entrar
            </button>
</form>
<!-- Secondary Actions -->
<div class="flex flex-col items-center justify-center gap-md mt-sm">
<a class="font-body-md text-body-md text-on-surface hover:text-primary transition-colors underline decoration-1 underline-offset-4" href="#">
                Esqueci minha senha
            </a>
<a class="font-body-md text-body-md text-on-surface hover:text-primary transition-colors underline decoration-1 underline-offset-4" href="#">
                Criar conta
            </a>
</div>
</main>
</body></html>
